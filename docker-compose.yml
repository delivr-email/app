services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resend
      POSTGRES_PASSWORD: resend
      POSTGRES_DB: resend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
